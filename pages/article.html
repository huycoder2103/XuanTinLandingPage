<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài viết | Xuân Tín Logistics</title>
    <link rel="icon" type="image/x-icon" href="../pic/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        orange: { 500: '#e8af06' },
                        blue: { 900: '#003399' },
                        black: '#0f172a',
                        white: '#f8fafc'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@800;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/article.css">
    <script src="../js/loading.js"></script>
    <script src="../js/news.js"></script>
    <script src="../js/loader.js" defer></script>
</head>
<body class="bg-white text-black">
    <nav id="global-header" class="fixed top-0 left-0 w-full z-[1000]"></nav>

    <main id="article-container" class="max-w-4xl mx-auto px-6 py-20">
        <p class="text-center text-black/40 py-20">Đang tải bài viết...</p>
    </main>

    <footer id="global-footer"></footer>

    <script>
        (async function () {
            const id = new URLSearchParams(window.location.search).get('id');
            if (!id) {
                document.getElementById('article-container').innerHTML =
                    '<p class="text-center text-red-500 py-20 font-bold">Không tìm thấy bài viết.</p>';
                return;
            }
            try {
                const articles = await fetchArticles();
                const article = articles.find(a => a.id === id);
                if (!article) {
                    document.getElementById('article-container').innerHTML =
                        '<p class="text-center text-red-500 py-20 font-bold">Bài viết không tồn tại.</p>';
                    return;
                }
                document.title = article.title + ' | Xuân Tín Logistics';
                document.querySelector('meta[name="description"]')?.setAttribute('content', article.summary);
                document.getElementById('article-container').innerHTML = renderArticlePage(article);
            } catch (e) {
                console.error('[News]', e);
                document.getElementById('article-container').innerHTML =
                    '<p class="text-center text-red-500 py-20 font-bold">Lỗi tải bài viết. Vui lòng thử lại.</p>';
            }
        })();
    </script>
</body>
</html>
